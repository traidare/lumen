version: 2
project_name: lumen

before:
  hooks:
    - apt-get update -qq
    - apt-get install -y libsqlite3-dev
    - cp /usr/include/sqlite3.h /usr/x86_64-w64-mingw32/include/sqlite3.h

builds:
  - id: macos
    main: .
    binary: lumen
    flags:
      - -tags=fts5
    ldflags:
      - -s -w -X github.com/ory/lumen/cmd.buildVersion={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    goos:
      - darwin
    goarch:
      - amd64
      - arm64

  - id: linux-amd64
    main: .
    binary: lumen
    flags:
      - -tags=fts5
    ldflags:
      - -s -w -X github.com/ory/lumen/cmd.buildVersion={{.Version}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64

  - id: linux-arm64
    main: .
    binary: lumen
    flags:
      - -tags=fts5
    ldflags:
      - -s -w -X github.com/ory/lumen/cmd.buildVersion={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
    goos:
      - linux
    goarch:
      - arm64

  - id: windows
    main: .
    binary: lumen
    flags:
      - -tags=fts5
    ldflags:
      - -s -w -X github.com/ory/lumen/cmd.buildVersion={{.Version}}
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos:
      - windows
    goarch:
      - amd64

archives:
  - id: default
    formats:
      - binary
    name_template: '{{ .ProjectName }}-{{ .Version }}-{{ .Os }}-{{ .Arch }}'

checksum:
  name_template: checksums.txt

release:
  github:
    owner: ory
    name: lumen
